<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Apollo Light Controller</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #7c5cff;
    --accent-glow: rgba(124, 92, 255, 0.3);
    --success: #00e676;
    --warning: #ffab00;
    --danger: #ff5252;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #7c5cff, #00c6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-badge.connected { border-color: var(--success); color: var(--success); }
  .status-badge.connected .status-dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-badge.connecting { border-color: var(--warning); color: var(--warning); }
  .status-badge.connecting .status-dot { background: var(--warning); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 0 16px 14px;
    padding: 20px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* Connect Section */
  .connect-area { display: flex; gap: 10px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; pointer-events: none; }
  .btn-primary {
    background: linear-gradient(135deg, #7c5cff, #5c3cdf);
    flex: 1;
    box-shadow: 0 4px 15px var(--accent-glow);
  }
  .btn-primary:active { box-shadow: 0 2px 8px var(--accent-glow); }
  .btn-danger {
    background: linear-gradient(135deg, #ff5252, #d32f2f);
    padding: 14px 18px;
  }
  .device-name {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 10px;
    text-align: center;
  }

  /* Power Toggle */
  .power-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .power-label { font-size: 18px; font-weight: 600; }
  .toggle-track {
    width: 64px;
    height: 34px;
    border-radius: 17px;
    background: #333;
    cursor: pointer;
    position: relative;
    transition: background 0.3s;
    border: 2px solid transparent;
  }
  .toggle-track.on {
    background: linear-gradient(135deg, #7c5cff, #5c3cdf);
    box-shadow: 0 0 15px var(--accent-glow);
  }
  .toggle-knob {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #fff;
    position: absolute;
    top: 2px; left: 2px;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .toggle-track.on .toggle-knob { transform: translateX(30px); }

  /* Color Wheel */
  .color-wheel-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .wheel-wrapper { position: relative; width: 240px; height: 240px; }
  #colorWheel {
    width: 240px; height: 240px;
    border-radius: 50%;
    cursor: crosshair;
    touch-action: none;
  }
  .wheel-cursor {
    position: absolute;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 6px rgba(0,0,0,0.5), inset 0 0 4px rgba(0,0,0,0.2);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: left 0.05s, top 0.05s;
  }
  .color-preview-row {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .color-swatch {
    width: 48px; height: 48px;
    border-radius: 12px;
    border: 2px solid var(--border);
    transition: background 0.15s, box-shadow 0.15s;
  }
  .color-hex {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .btn-send-color {
    margin-left: auto;
    padding: 10px 20px;
    font-size: 13px;
    background: linear-gradient(135deg, #7c5cff, #5c3cdf);
    box-shadow: 0 3px 10px var(--accent-glow);
  }

  /* Sliders */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .slider-row + .slider-row { margin-top: 14px; }
  .slider-icon { font-size: 18px; color: var(--text-dim); flex-shrink: 0; width: 22px; text-align: center; }
  .slider-container { flex: 1; position: relative; }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c5cff, #5c3cdf);
    box-shadow: 0 2px 8px var(--accent-glow);
    cursor: pointer;
  }
  #warmWhiteSlider::-webkit-slider-thumb {
    background: linear-gradient(135deg, #ffcc66, #cc8800);
  }
  .slider-val {
    font-size: 16px;
    font-weight: 700;
    min-width: 45px;
    text-align: right;
    color: var(--text);
  }
  .slider-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
    min-width: 22px;
  }

  /* Presets */
  .presets-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .preset-btn {
    aspect-ratio: 1;
    border-radius: 14px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .preset-btn:active { transform: scale(0.88); }
  .preset-btn.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); }
  .preset-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .presets-grid-wrapper { padding-bottom: 20px; }

  /* Effects */
  .effects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .effect-btn {
    padding: 12px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .effect-btn:active { transform: scale(0.95); }
  .effect-btn.active {
    border-color: var(--accent);
    background: rgba(124, 92, 255, 0.15);
    color: #b8a0ff;
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .effect-btn .effect-icon {
    display: block;
    font-size: 18px;
    margin-bottom: 4px;
  }
  .effect-stop-row {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  .btn-stop {
    flex: 1;
    padding: 10px;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 12px 24px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Error overlay */
  .no-bluetooth {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
    gap: 16px;
  }
  .no-bluetooth svg { width: 64px; height: 64px; opacity: 0.4; }
  .no-bluetooth h2 { font-size: 20px; }
  .no-bluetooth p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

  .bottom-spacer { height: 30px; flex-shrink: 0; }
  .controls-section { transition: opacity 0.3s; }
  .controls-section.disabled { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <h1>Apollo</h1>
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <div class="no-bluetooth" id="noBluetooth">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M6.343 6.343l11.314 11.314M12 2v7.5l4.5-4.5L12 2zm0 20v-7.5l4.5 4.5L12 22zM2 12h4M18 12h4"/>
      <line x1="3" y1="3" x2="21" y2="21" stroke-width="2"/>
    </svg>
    <h2>Bluetooth Not Available</h2>
    <p>This app requires Web Bluetooth, which is available in Chrome on Android. Make sure you're using Chrome and Bluetooth is enabled on your device.</p>
  </div>

  <div id="mainContent">
    <!-- Connect -->
    <div class="card">
      <div class="card-label">Connection</div>
      <div class="connect-area">
        <button class="btn btn-primary" id="connectBtn" onclick="handleConnect()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5l11 11M12 2v7.5l4.5-4.5M12 22v-7.5l4.5 4.5M12 2L7.5 6.5M12 22l-4.5-4.5"/></svg>
          <span id="connectBtnText">Connect</span>
        </button>
        <button class="btn btn-danger" id="disconnectBtn" onclick="handleDisconnect()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="device-name" id="deviceName"></div>
    </div>

    <div class="controls-section disabled" id="controls">
      <!-- Power -->
      <div class="card">
        <div class="card-label">Power</div>
        <div class="power-row">
          <span class="power-label" id="powerLabel">OFF</span>
          <div class="toggle-track" id="powerToggle" onclick="togglePower()">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>

      <!-- Color Wheel -->
      <div class="card">
        <div class="card-label">Color</div>
        <div class="color-wheel-container">
          <div class="wheel-wrapper">
            <canvas id="colorWheel" width="480" height="480"></canvas>
            <div class="wheel-cursor" id="wheelCursor"></div>
          </div>
          <div class="color-preview-row">
            <div class="color-swatch" id="colorSwatch" style="background: #ff0000;"></div>
            <span class="color-hex" id="colorHex">#FF0000</span>
            <button class="btn btn-send-color" onclick="sendCurrentColor()">Apply</button>
          </div>
        </div>
      </div>

      <!-- Brightness + Warm White -->
      <div class="card">
        <div class="card-label">Brightness &amp; Warm White</div>
        <div class="slider-row">
          <span class="slider-icon">&#9788;</span>
          <div class="slider-container">
            <input type="range" id="brightnessSlider" min="5" max="100" value="100" oninput="onBrightnessChange(this.value)">
          </div>
          <span class="slider-val" id="brightnessVal">100%</span>
        </div>
        <div class="slider-row">
          <span class="slider-icon" style="color:#ffcc66;">&#9679;</span>
          <div class="slider-container">
            <input type="range" id="warmWhiteSlider" min="0" max="255" value="0" oninput="onWarmWhiteChange(this.value)">
          </div>
          <span class="slider-val" id="warmWhiteVal">0</span>
        </div>
      </div>

      <!-- Presets -->
      <div class="card">
        <div class="card-label">Presets</div>
        <div class="presets-grid-wrapper">
          <div class="presets-grid" id="presetsGrid"></div>
        </div>
      </div>

      <!-- Effects -->
      <div class="card">
        <div class="card-label">Effects</div>
        <div class="effects-grid" id="effectsGrid"></div>
        <div class="slider-row" style="margin-top:14px;">
          <span class="slider-label">SPD</span>
          <div class="slider-container">
            <input type="range" id="speedSlider" min="1" max="255" value="128" oninput="onSpeedChange(this.value)">
          </div>
          <span class="slider-val" id="speedVal" style="font-size:13px;">128</span>
        </div>
        <div class="effect-stop-row">
          <button class="btn btn-stop" onclick="stopEffect()">Stop Effect</button>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-spacer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ Apollo BLE Protocol (from APK reverse-engineering) ============
// Service UUID:        0000ffd5-0000-1000-8000-00805f9b34fb
// Characteristic UUID: 0000ffd9-0000-1000-8000-00805f9b34fb
// Power ON:   [0xCC, 0x23, 0x33]
// Power OFF:  [0xCC, 0x24, 0x33]
// Set Color:  [0x56, R, G, B, WW, 0xF0, 0xAA]  (WW = warm white)
// Set Mode:   [0xBB, modeId, speed, 0x44]
// ============================================================================

const BLE_SERVICE_UUID = 0xffd5;
const BLE_CHAR_UUID = 0xffd9;

// Effect modes extracted from APK's Mods array
const EFFECTS = [
  { id: 0x25, name: '7-Color Fade', icon: '🌈' },
  { id: 0x26, name: 'Red Fade', icon: '🔴' },
  { id: 0x27, name: 'Green Fade', icon: '🟢' },
  { id: 0x28, name: 'Blue Fade', icon: '🔵' },
  { id: 0x29, name: 'Yellow Fade', icon: '🟡' },
  { id: 0x2A, name: 'Cyan Fade', icon: '🩵' },
  { id: 0x2B, name: 'Purple Fade', icon: '🟣' },
  { id: 0x2C, name: 'White Fade', icon: '⚪' },
  { id: 0x2D, name: 'Red-Green', icon: '🎄' },
  { id: 0x2E, name: 'Red-Blue', icon: '🎆' },
  { id: 0x2F, name: 'Green-Blue', icon: '🌊' },
  { id: 0x30, name: '7-Color Strobe', icon: '⚡' },
  { id: 0x31, name: 'Red Strobe', icon: '💥' },
  { id: 0x32, name: 'Green Strobe', icon: '💚' },
  { id: 0x33, name: 'Blue Strobe', icon: '💙' },
  { id: 0x34, name: 'Yellow Strobe', icon: '💛' },
  { id: 0x35, name: 'Cyan Strobe', icon: '🩵' },
  { id: 0x36, name: 'Purple Strobe', icon: '💜' },
  { id: 0x37, name: 'White Strobe', icon: '🤍' },
  { id: 0x38, name: '7-Color Jump', icon: '🎯' },
];

// ============ State ============
let bleDevice = null;
let bleCharacteristic = null;
let isConnected = false;
let isPowerOn = false;
let currentColor = { r: 255, g: 0, b: 0 };
let brightness = 100;
let warmWhite = 0;
let effectSpeed = 128;
let activeEffect = null;
let writeQueue = Promise.resolve();

const PRESETS = [
  { name: 'Red', r: 255, g: 0, b: 0 },
  { name: 'Orange', r: 255, g: 100, b: 0 },
  { name: 'Yellow', r: 255, g: 200, b: 0 },
  { name: 'Lime', r: 100, g: 255, b: 0 },
  { name: 'Green', r: 0, g: 255, b: 0 },
  { name: 'Cyan', r: 0, g: 255, b: 255 },
  { name: 'Blue', r: 0, g: 80, b: 255 },
  { name: 'Purple', r: 128, g: 0, b: 255 },
  { name: 'Pink', r: 255, g: 0, b: 128 },
  { name: 'W.White', r: 255, g: 180, b: 100 },
];

// ============ Init ============
document.addEventListener('DOMContentLoaded', () => {
  if (!navigator.bluetooth) {
    document.getElementById('noBluetooth').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'none';
    return;
  }
  drawColorWheel();
  buildPresets();
  buildEffects();
  initWheelInteraction();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});

// ============ BLE Connection ============
async function handleConnect() {
  try {
    setStatus('connecting');
    document.getElementById('connectBtnText').textContent = 'Scanning...';
    document.getElementById('connectBtn').disabled = true;

    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'AP' }],
      optionalServices: [BLE_SERVICE_UUID]
    });

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    document.getElementById('connectBtnText').textContent = 'Connecting...';
    const server = await bleDevice.gatt.connect();

    // Try the known Apollo service/characteristic UUIDs first
    try {
      const service = await server.getPrimaryService(BLE_SERVICE_UUID);
      bleCharacteristic = await service.getCharacteristic(BLE_CHAR_UUID);
    } catch (e) {
      // Fallback: scan all services for writable characteristic
      const services = await server.getPrimaryServices();
      for (const service of services) {
        try {
          const chars = await service.getCharacteristics();
          for (const char of chars) {
            if (char.properties.write || char.properties.writeWithoutResponse) {
              bleCharacteristic = char;
              break;
            }
          }
          if (bleCharacteristic) break;
        } catch (e2) { /* skip */ }
      }
    }

    if (!bleCharacteristic) throw new Error('No writable characteristic found');

    isConnected = true;
    setStatus('connected');
    document.getElementById('connectBtn').disabled = true;
    document.getElementById('disconnectBtn').disabled = false;
    document.getElementById('connectBtnText').textContent = 'Connected';
    document.getElementById('deviceName').textContent = bleDevice.name || 'Unknown Device';
    document.getElementById('controls').classList.remove('disabled');
    showToast('Connected to ' + (bleDevice.name || 'device'));
    vibrate();

  } catch (err) {
    console.error('Connection failed:', err);
    setStatus('disconnected');
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('connectBtnText').textContent = 'Connect';
    if (err.name !== 'NotFoundError') {
      showToast('Connection failed: ' + err.message);
    }
  }
}

function handleDisconnect() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
  cleanupConnection();
  showToast('Disconnected');
  vibrate();
}

function onDisconnected() {
  cleanupConnection();
  showToast('Device disconnected');
}

function cleanupConnection() {
  isConnected = false;
  bleCharacteristic = null;
  setStatus('disconnected');
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('disconnectBtn').disabled = true;
  document.getElementById('connectBtnText').textContent = 'Connect';
  document.getElementById('deviceName').textContent = '';
  document.getElementById('controls').classList.add('disabled');
}

function setStatus(state) {
  const badge = document.getElementById('statusBadge');
  const text = document.getElementById('statusText');
  badge.className = 'status-badge ' + state;
  text.textContent = state.charAt(0).toUpperCase() + state.slice(1);
}

// ============ BLE Write ============
function writeBytes(bytes) {
  if (!bleCharacteristic || !isConnected) return;
  const data = new Uint8Array(bytes);
  writeQueue = writeQueue.then(async () => {
    try {
      if (bleCharacteristic.properties.writeWithoutResponse) {
        await bleCharacteristic.writeValueWithoutResponse(data);
      } else {
        await bleCharacteristic.writeValueWithResponse(data);
      }
    } catch (err) {
      // Retry once after 100ms
      try {
        await new Promise(r => setTimeout(r, 100));
        if (bleCharacteristic.properties.writeWithoutResponse) {
          await bleCharacteristic.writeValueWithoutResponse(data);
        } else {
          await bleCharacteristic.writeValueWithResponse(data);
        }
      } catch (e2) {
        showToast('Command failed');
      }
    }
  });
}

// ============ Commands (from APK protocol) ============
function cmdPowerOn()  { writeBytes([0xCC, 0x23, 0x33]); }
function cmdPowerOff() { writeBytes([0xCC, 0x24, 0x33]); }

function cmdSetColor(r, g, b, ww) {
  // Protocol: [0x56, R, G, B, WW, 0xF0, 0xAA]
  const scale = brightness / 100;
  writeBytes([
    0x56,
    Math.round(r * scale),
    Math.round(g * scale),
    Math.round(b * scale),
    Math.round(ww * scale),
    0xF0,
    0xAA
  ]);
}

function cmdSetMode(modeId, speed) {
  // Protocol: [0xBB, mode, speed, 0x44]
  writeBytes([0xBB, modeId & 0xFF, speed & 0xFF, 0x44]);
}

// ============ Power ============
function togglePower() {
  isPowerOn = !isPowerOn;
  document.getElementById('powerToggle').classList.toggle('on', isPowerOn);
  document.getElementById('powerLabel').textContent = isPowerOn ? 'ON' : 'OFF';
  isPowerOn ? cmdPowerOn() : cmdPowerOff();
  vibrate();
}

// ============ Color ============
function sendColorCommand(r, g, b) {
  activeEffect = null;
  document.querySelectorAll('.effect-btn.active').forEach(b => b.classList.remove('active'));
  cmdSetColor(r, g, b, warmWhite);
}

function sendCurrentColor() {
  sendColorCommand(currentColor.r, currentColor.g, currentColor.b);
  vibrate();
  showToast('Color applied');
}

function updateColorDisplay(r, g, b) {
  currentColor = { r, g, b };
  const hexStr = '#' +
    r.toString(16).padStart(2, '0').toUpperCase() +
    g.toString(16).padStart(2, '0').toUpperCase() +
    b.toString(16).padStart(2, '0').toUpperCase();
  document.getElementById('colorSwatch').style.background = `rgb(${r},${g},${b})`;
  document.getElementById('colorSwatch').style.boxShadow = `0 0 20px rgba(${r},${g},${b},0.4)`;
  document.getElementById('colorHex').textContent = hexStr;
  document.getElementById('wheelCursor').style.background = `rgb(${r},${g},${b})`;
  document.querySelectorAll('.preset-btn.active').forEach(b => b.classList.remove('active'));
}

// ============ Color Wheel ============
function drawColorWheel() {
  const canvas = document.getElementById('colorWheel');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2, radius = cx;
  const imageData = ctx.createImageData(w, h);
  const data = imageData.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= radius) {
        const angle = Math.atan2(dy, dx);
        const hue = ((angle * 180 / Math.PI) + 360) % 360;
        const sat = dist / radius;
        const rgb = hsvToRgb(hue, sat, 1);
        const idx = (y * w + x) * 4;
        data[idx] = rgb[0]; data[idx+1] = rgb[1]; data[idx+2] = rgb[2]; data[idx+3] = 255;
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

function hsvToRgb(h, s, v) {
  const c = v * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
  let r, g, b;
  if (h < 60)       { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}

function initWheelInteraction() {
  const canvas = document.getElementById('colorWheel');
  const cursor = document.getElementById('wheelCursor');
  let dragging = false;
  function pickColor(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left, y = clientY - rect.top;
    const cx = rect.width/2, cy = rect.height/2;
    const dx = x - cx, dy = y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > rect.width/2) return;
    const angle = Math.atan2(dy, dx);
    const hue = ((angle * 180 / Math.PI) + 360) % 360;
    const sat = Math.min(dist / (rect.width/2), 1);
    const rgb = hsvToRgb(hue, sat, 1);
    cursor.style.left = (x / rect.width * 100) + '%';
    cursor.style.top = (y / rect.height * 100) + '%';
    updateColorDisplay(rgb[0], rgb[1], rgb[2]);
  }
  canvas.addEventListener('pointerdown', (e) => { dragging = true; canvas.setPointerCapture(e.pointerId); pickColor(e.clientX, e.clientY); });
  canvas.addEventListener('pointermove', (e) => { if (dragging) pickColor(e.clientX, e.clientY); });
  canvas.addEventListener('pointerup', () => { if (dragging) { dragging = false; sendColorCommand(currentColor.r, currentColor.g, currentColor.b); } });
  canvas.addEventListener('pointercancel', () => { dragging = false; });
  cursor.style.left = '88%'; cursor.style.top = '50%';
}

// ============ Brightness + Warm White ============
function onBrightnessChange(val) {
  brightness = parseInt(val);
  document.getElementById('brightnessVal').textContent = brightness + '%';
}

function onWarmWhiteChange(val) {
  warmWhite = parseInt(val);
  document.getElementById('warmWhiteVal').textContent = warmWhite;
}

document.addEventListener('DOMContentLoaded', () => {
  const bs = document.getElementById('brightnessSlider');
  const ww = document.getElementById('warmWhiteSlider');
  if (bs) bs.addEventListener('change', () => {
    if (isConnected && !activeEffect) sendColorCommand(currentColor.r, currentColor.g, currentColor.b);
  });
  if (ww) ww.addEventListener('change', () => {
    if (isConnected && !activeEffect) sendColorCommand(currentColor.r, currentColor.g, currentColor.b);
  });
});

// ============ Presets ============
function buildPresets() {
  const grid = document.getElementById('presetsGrid');
  PRESETS.forEach((preset) => {
    const btn = document.createElement('div');
    btn.className = 'preset-btn';
    btn.style.background = `rgb(${preset.r}, ${preset.g}, ${preset.b})`;
    btn.innerHTML = `<span class="preset-label">${preset.name}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn.active').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateColorDisplay(preset.r, preset.g, preset.b);
      sendColorCommand(preset.r, preset.g, preset.b);
      vibrate();
    });
    grid.appendChild(btn);
  });
}

// ============ Effects ============
function buildEffects() {
  const grid = document.getElementById('effectsGrid');
  EFFECTS.forEach((effect) => {
    const btn = document.createElement('div');
    btn.className = 'effect-btn';
    btn.innerHTML = `<span class="effect-icon">${effect.icon}</span>${effect.name}`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.effect-btn.active').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeEffect = effect.id;
      cmdSetMode(effect.id, effectSpeed);
      vibrate();
      showToast(effect.name);
    });
    grid.appendChild(btn);
  });
}

function onSpeedChange(val) {
  effectSpeed = parseInt(val);
  document.getElementById('speedVal').textContent = effectSpeed;
  if (activeEffect && isConnected) {
    cmdSetMode(activeEffect, effectSpeed);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const ss = document.getElementById('speedSlider');
  if (ss) ss.addEventListener('input', (e) => onSpeedChange(e.target.value));
});

function stopEffect() {
  activeEffect = null;
  document.querySelectorAll('.effect-btn.active').forEach(b => b.classList.remove('active'));
  sendColorCommand(currentColor.r, currentColor.g, currentColor.b);
  showToast('Effect stopped');
  vibrate();
}

// ============ Utils ============
function vibrate() { if (navigator.vibrate) navigator.vibrate(15); }

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
}
</script>
